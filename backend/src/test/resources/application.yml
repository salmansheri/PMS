spring:
  # ==========================================
  # Exclude Redis and RabbitMQ during JUnit runs
  # ==========================================
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
      - org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration
  data:
    redis:
      repositories:
        enabled: false

  # ==========================================
  # Use H2 in-memory DB for Unit/Integration Tests
  # ==========================================
  datasource:
    url: jdbc:h2:mem:pmstest;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false

# Override JWT secret for tests
pms:
  security:
    jwt:
      secret: dG9reW9jbGluaWNvc3Btc2JhY2tlbmRzZWNyZXJrZXlzdHJpbmc2Nzg5MA==
      expiration-ms: 3600000
      cookie-name: token
